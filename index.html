<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4Practice 2</title>
</head>
<body>
    <h1>Switch Statement</h1>
    <button class="btn btn-info" onclick="teamRank()">Rank</button>
    <Script>

        function teamRank(){
            var rank = "1st";

            message = "";
            
            switch(true){
                case (rank === "1st"):
                    message = ("Champions!")
                    break;
                case (rank === "2nd"):
                    message = ("1st Runner Ups!")
                    break;
                case (rank === "3rd"): 
                    message = ("2nd Runner Ups!")
                    break;
                case (rank === "4th"):
                    message = ("3rd Runner Ups!")
                    break; 
            message = "Rank could not be determined";
            }
            alert(message);
        }
        let team  = "Bulldogs"; //string
        switch(team){
            case "Bulldogs" : 
                alert("Go Red Bulldogs!");
                break;
            case "Bears" :
                alert("Go Blue Bears!");
                    break;
            case "Tigers" :
                alert("Go Yellow Tigers!");
                break;
            case "Hornets":
                alert("Go Green Hornets!");
                break;
        default:
            alert("Team could not be determined");
                
        }
    </Script>
    
</body>
</html>
