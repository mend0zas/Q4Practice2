<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4Practice 2</title>
</head>
<body>
    <h1>Switch Statement</h1>
    <button class="btn btn-info" onclick="teamRank()">Rank</button>
    <Script>

        function teamRank(){
            var rank = "1st";
            switch(rank){
                case "1st":
                    alert("Champions!")
                    break;
                case "2nd":
                    alert("1st Runner Ups!")
                    break;
                case "3rd":
                    alert("2nd Runner Ups!")
                    break;
                case "4th":
                    alert("3rd Runner Ups!")
                    break; 
            default:
                alert("Rank could not be determined.")
            }
        }
        let team  = "Bulldogs"; //string
        switch(team){
            case "Bulldogs" : 
                alert("Go Red Bulldogs!");
                break;
            case "Bears" :
                alert("Go Blue Bears!");
                    break;
            case "Tigers" :
                alert("Go Yellow Tigers!");
                break;
            case "Hornets":
                alert("Go Green Hornets!");
                break;
        default:
            alert("Team could not be determined");
                
        }
    </Script>
    
</body>
</html>
